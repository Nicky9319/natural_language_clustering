services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/home/mambauser/.cache/huggingface
      - EMBEDDING_MODEL=BAAI/bge-m3
    volumes:
      - backend-huggingface-cache:/home/mambauser/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5000
    restart: unless-stopped

volumes:
  backend-huggingface-cache:
